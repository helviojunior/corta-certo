services:
  corta-certo:
    build: .
    image: corta-certo:latest
    container_name: corta-certo
    ports:
      # porta publicada no host (configurável via .env). Padrão: 8080
      - "${HOST_PORT:-8080}:80"
    volumes:
      - ./data:/app/data
    environment:
      # 1 = versão online/pública: cookie de sessão por visitante, a lista de
      # projetos mostra só os do dono do cookie e editar/excluir exige ser o dono.
      # Defina ONLINE_MODE no arquivo .env (veja .env.example).
      - ONLINE_MODE=${ONLINE_MODE:-0}
    restart: unless-stopped
